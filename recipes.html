<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes — NARU</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{--cream:#FDFAF4;--warm:#F4EDE0;--spice:#B85C2C;--forest:#354D3C;--ink:#1C1610;--stone:#7C7060;--gold:#C4913A;--border:rgba(28,22,16,0.1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 2.5rem;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:0;z-index:10;}
  .logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;letter-spacing:0.16em;text-decoration:none;color:var(--ink);}
  .logo-line{font-size:0.52rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--stone);display:block;margin-top:1px;}
  nav a{color:var(--stone);text-decoration:none;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;transition:color 0.2s;}
  nav a:hover{color:var(--spice);}
  .nav-right{display:flex;gap:1.8rem;align-items:center;}

  .page-head{background:var(--warm);border-bottom:1px solid var(--border);padding:3.5rem 4rem 3rem;}
  .page-head-inner{max-width:960px;margin:0 auto;}
  .eyebrow{font-size:0.62rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--spice);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.7rem;}
  .eyebrow::before{content:'';width:20px;height:1px;background:var(--spice);}
  h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.1;margin-bottom:0.6rem;}
  h1 em{font-style:italic;color:var(--spice);}
  .head-sub{font-size:0.88rem;color:var(--stone);line-height:1.7;}

  .filters{padding:1.5rem 4rem;border-bottom:1px solid var(--border);display:flex;gap:0.6rem;flex-wrap:wrap;}
  .filter-btn{background:white;border:1px solid var(--border);padding:0.4rem 1rem;border-radius:100px;font-size:0.7rem;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;color:var(--stone);}
  .filter-btn:hover,.filter-btn.active{background:var(--spice);border-color:var(--spice);color:white;}

  .recipes-grid{max-width:1100px;margin:0 auto;padding:3rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.4rem;}

  .recipe-card{background:white;border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer;}
  .recipe-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(28,22,16,0.09);}
  .rc-thumb{height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;}
  .rc-body{padding:1.3rem;}
  .rc-cat{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--spice);margin-bottom:0.35rem;}
  .rc-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:500;line-height:1.3;margin-bottom:0.35rem;}
  .rc-desc{font-size:0.76rem;color:var(--stone);line-height:1.6;margin-bottom:1rem;}
  .rc-foot{display:flex;gap:1rem;padding-top:0.8rem;border-top:1px solid var(--border);}
  .rc-meta{font-size:0.65rem;color:var(--stone);}
  .rc-delete{margin-left:auto;background:none;border:none;cursor:pointer;font-size:0.65rem;color:rgba(28,22,16,0.2);transition:color 0.2s;font-family:'Jost',sans-serif;letter-spacing:0.05em;}
  .rc-delete:hover{color:#c0392b;}

  .empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;}
  .empty-state .es-icon{font-size:3rem;margin-bottom:1rem;}
  .empty-state h3{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;margin-bottom:0.5rem;}
  .empty-state p{font-size:0.85rem;color:var(--stone);line-height:1.7;margin-bottom:1.5rem;}
  .empty-state a{color:var(--spice);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;border-bottom:1px solid var(--spice);}

  @media(max-width:768px){
    nav{padding:1rem 1.5rem;}
    .page-head,.filters{padding-left:1.5rem;padding-right:1.5rem;}
    .recipes-grid{padding:2rem 1.5rem;}
  }
</style>
</head>
<body>
  <nav>
    <a href="index.html">
      <span class="logo">NARU</span>
      <span class="logo-line">Food Made With Care</span>
    </a>
    <div class="nav-right">
      <a href="index.html">← Home</a>
      <a href="admin.html" style="color:var(--spice)">+ Add Recipe</a>
    </div>
  </nav>

  <div class="page-head">
    <div class="page-head-inner">
      <div class="eyebrow">From the Kitchen</div>
      <h1>All <em>Recipes.</em></h1>
      <p class="head-sub">Everything we've made and written up — updated as we go.</p>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterRecipes('all', this)">All</button>
  </div>

  <div class="recipes-grid" id="recipes-grid">
    <!-- populated by JS -->
  </div>

<script>
  const STORAGE_KEY = 'naru_recipes';
  let currentFilter = 'all';

  function getRecipes() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }

  const THUMB_COLORS = {
    'Bread & Baking':'#F7F0E3','Fermentation':'#E8EFE9','Mains':'#F9EDE5',
    'Condiments':'#FBF3E4','Breakfast':'#EDE3D0','Baking':'#F7F0E3',
    'Desserts':'#FEF0F5','Snacks':'#F0F4E8','Soups':'#FFF3E8','Default':'#F4EDE0'
  };

  function thumbColor(cat) { return THUMB_COLORS[cat] || THUMB_COLORS['Default']; }

  function renderFilters(recipes) {
    const cats = ['All', ...new Set(recipes.map(r => r.category))];
    document.getElementById('filters').innerHTML = cats.map(c =>
      `<button class="filter-btn ${c==='All'&&currentFilter==='all'?'active':c===currentFilter?'active':''}"
        onclick="filterRecipes('${c==='All'?'all':c}', this)">${c}</button>`
    ).join('');
  }

  function renderGrid(recipes) {
    const grid = document.getElementById('recipes-grid');
    const filtered = currentFilter === 'all' ? recipes : recipes.filter(r => r.category === currentFilter);
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="es-icon">🍳</div>
        <h3>No recipes yet</h3>
        <p>Head to the admin page to add your first recipe — it'll show up here instantly.</p>
        <a href="admin.html">Add a recipe →</a>
      </div>`;
      return;
    }
    grid.innerHTML = filtered.map((r, i) => `
      <div class="recipe-card">
        <div class="rc-thumb" style="background:${thumbColor(r.category)}">${r.emoji || '🍽️'}</div>
        <div class="rc-body">
          <div class="rc-cat">${r.category}</div>
          <div class="rc-title">${r.title}</div>
          <div class="rc-desc">${r.description || ''}</div>
          <div class="rc-foot">
            <span class="rc-meta">⏱ ${r.cookTime}</span>
            <span class="rc-meta">· ${r.difficulty}</span>
            <button class="rc-delete" onclick="deleteRecipe(${recipes.indexOf(r)})">✕ Remove</button>
          </div>
        </div>
      </div>`).join('');
  }

  function filterRecipes(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(getRecipes());
  }

  function deleteRecipe(index) {
    if (!confirm('Remove this recipe?')) return;
    const recipes = getRecipes();
    recipes.splice(index, 1);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
    init();
  }

  function init() {
    const recipes = getRecipes();
    renderFilters(recipes);
    renderGrid(recipes);
  }

  init();
</script>
</body>
</html>
